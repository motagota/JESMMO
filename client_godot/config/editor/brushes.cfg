; Editor brush definitions (terrain editing #78) — data-driven per the design
; doc's brush philosophy: new brushes/param tweaks are edits here, not code.
; Godot ConfigFile format (same shape as the doc's TOML sketch; ConfigFile
; because Godot parses it natively — values are GDScript literals).
;
; Per-brush keys the BrushController reads:
;   falloff        "smooth" | "linear" | "sharp"  (weight vs distance from center)
;   radius         {"default": m, "min": m, "max": m}   world meters
;   strength       {"default": s, "min": s, "max": s}   0..1 multiplier
;   rate_cm_per_s  full-strength height change at the brush center, cm/second
;
; `lower` is not a separate brush: Shift inverts `raise` in the controller.

[raise]
falloff = "smooth"
radius = {"default": 40.0, "min": 5.0, "max": 320.0}
strength = {"default": 0.4, "min": 0.05, "max": 1.0}
rate_cm_per_s = 400.0
