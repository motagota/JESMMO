# Production terrain config for the Phase 1 capital. Real DEM ingest (#69):
# `dem_data/brisbane_capital_25m.grid` is a real Geoscience Australia 5m
# LiDAR DTM, reprojected to UTM zone 56S, cropped to the 6.4km x 6.4km
# `bounds_utm` rectangle below, resampled to 25m, with `tools/convert_dem.py`
# (see `terrain-bake/README.md`). This AOI was picked specifically to capture
# a real, recognizable stretch of the Brisbane River's characteristic
# S-bends (a 6.4km window landing on generic hill country doesn't read as
# "Brisbane" at all -- verified by eyeballing a hillshade+water preview
# before committing to this crop). The suburbs starter-plot field's
# flatten-mask rectangle (see [stylize] below) was checked against the real
# river and sits entirely clear of it.
#
# Regenerate with (from the repo root):
#   cargo run -p terrain-bake -- --config terrain.toml
#
# then commit the resulting `artifacts/world_v1/` directory alongside this
# file — the server loads it at boot (see `rust_server::world::loaded_terrain`).

[source]
dem_path      = "dem_data/brisbane_capital_25m.grid"
bounds_utm    = [501600.0, 6955700.0, 508000.0, 6962100.0]
working_res_m = 25.0
target_res_m  = 25.0
seed          = 1337

[export]
tile_size = 256
out_dir   = "artifacts/world_v1/"

[water]
# Comfortably below this AOI's real minimum (~-18.8m, the actual river
# channel bed) so the water mask stays empty -- the Godot client doesn't
# render biome/water data yet (only the height mesh), so nav-blocking a real
# river here would produce an invisible, confusing wall with no visual cue.
# Revisit once client-side water rendering exists.
sea_level_m = -25.0
open_close_radius = 1
min_river_width_m = 20.0
clamp_epsilon_m = 0.2

[stylize]
horizontal_scale = 1.0
vertical_curve_exp = 1.0
# Real relief this gentle (~130m over 6.4km, mostly the river valley wall)
# doesn't need taming the way the old synthetic placeholder's exaggerated
# shape did -- 1.0 keeps real, unscaled meters.
vertical_scale = 1.0
# Flattens the suburbs starter-plot field (240 plots, world.rs's `suburbs`
# district) so plots sit on level ground -- mirrors the old
# `flatten_terrain_for_plots` (#55), authored once at bake time. Mask rect in
# grid cells (25m/cell): x:[190,252), y:[0,100) -- covers the plot field's
# world-space bounding box x:[4840,6240], y:[40,2400] with margin to spare.
# This AOI's UTM offset was chosen so the real river passes nowhere near
# this rectangle (checked directly against the converted grid, zero
# low-lying/river cells inside it) -- the plot field sits on a real hillside,
# not in the valley.
capital_flatten_mask = "masks/capital_flatten.png"
capital_flatten_margin_m = 100.0

[detail]
# Small-scale texture on top of the real relief (#65) -- kept modest so it
# adds fine texture (this AOI was resampled from 5m down to 25m, smoothing
# some real micro-relief out) without overwhelming the real shape underneath.
# Skipped entirely inside the water mask (empty here anyway) and the
# capital_flatten footprint, so the buildable plot field stays exactly level.
octaves = 3
base_amp_m = 0.6
slope_amp_curve = 1.5
lacunarity = 2.0
gain = 0.5
base_wavelength_m = 60.0
seed = 4242

[erosion]
# Design doc defaults. A true no-op on this bake -- this AOI's steepest real
# slope (~38.6deg, the river valley wall) never reaches the 55deg talus
# threshold -- but the stage is real and exercised, ready for a future bake
# with steeper real terrain.
enabled = true
max_natural_slope = 55.0
thermal_iters = 40
hydraulic_iters = 0
hydraulic_strength = 0.1

[classify]
# Real slope variation now exists (mean ~4.3deg, up to ~38.6deg) -- unlike
# the old synthetic bake's near-uniform slope, a slope-based rule actually
# means something here: the river valley wall and steeper knolls read as
# forest, the rest as plains.
rules = [{ biome = "forest", min_slope = 8.0 }, { biome = "plains" }]
walkable_max_slope = 60.0
