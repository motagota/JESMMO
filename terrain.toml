# Production terrain config for the Phase 1 capital. Real DEM ingest (#69):
# `dem_data/brisbane_full_5m.grid` is a real Geoscience Australia 5m LiDAR
# DTM, reprojected to UTM zone 56S, cropped to the 25.6km x 25.6km
# `bounds_utm` rectangle below, kept at its NATIVE 5m resolution (no
# resampling) with `tools/convert_dem.py` (see `terrain-bake/README.md`).
# NOTE: at ~105MB the .grid exceeds GitHub's per-file limit and is
# gitignored -- regenerate it from the source `5m_DEM.tif` with:
#   python terrain-bake/tools/convert_dem.py --input 5m_DEM.tif \
#     --output dem_data/brisbane_full_5m.grid --dst-crs EPSG:32756 --res 5 \
#     --bounds 487930 6950660 513530 6976260 --sea-level 0
#
# This is the near-full extent of the source DEM (the previous v2 bake used
# a 6.4km crop, ~3% of it): the largest 640m-tile-aligned square placement
# that keeps the starter-plot field's flatten rectangle (now in the WEST
# district band -- see [stylize]) on 100% real high ground (min ~34m) and
# the town-centre spawn on land, chosen by scanning every candidate origin
# against the converted grid -- the same process that picked the v2 AOI.
# The east edge reaches the Brisbane River mouth and Moreton Bay: those
# water areas are NoData in the LiDAR and are filled flat at 0m (~10% of
# cells), reading as level coastal plains until client-side water rendering
# exists. The CBD river S-bends sit mid-map near the town-centre spawn.
#
# 128-cell tiles (640m each) over a 5120x5120 cell grid = a 40x40 tile
# grid. The coarse whole-world wire heightmap
# (`rust_server::world::TERRAIN_RESOLUTION`) is unrelated and unchanged --
# it's still built from this same artifact via `Terrain::sample_height`, just
# at its own fixed low resolution as the permanent backdrop.
#
# Regenerate with (from the repo root):
#   cargo run -p terrain-bake --release -- --config terrain.toml
#
# then commit the resulting `artifacts/world_v3/` directory alongside this
# file — the server loads it at boot (see `rust_server::world::loaded_terrain`).
# (v3, not v2: this is a materially different, non-backward-compatible bake --
# 16x the area, 16x the tiles, plot field moved to the west band.)

[source]
dem_path      = "dem_data/brisbane_full_5m.grid"
bounds_utm    = [487930.0, 6950660.0, 513530.0, 6976260.0]
working_res_m = 5.0
target_res_m  = 5.0
seed          = 1337

[export]
tile_size = 128
out_dir   = "artifacts/world_v3/"

[water]
# Comfortably below this crop's real minimum (~-21.4m, the actual river
# channel bed) so the water mask stays empty -- the Godot client doesn't
# render biome/water data yet (only the height mesh), so nav-blocking the
# river/bay here would produce an invisible, confusing wall with no visual
# cue. Revisit once client-side water rendering exists.
sea_level_m = -25.0
open_close_radius = 1
min_river_width_m = 20.0
clamp_epsilon_m = 0.2

[stylize]
horizontal_scale = 1.0
vertical_curve_exp = 1.0
# Real relief (~430m over 25.6km, hills in the west, coastal flats in the
# east) doesn't need taming the way the old synthetic placeholder's
# exaggerated shape did -- 1.0 keeps real, unscaled meters.
vertical_scale = 1.0
# Flattens the suburbs starter-plot field (240 plots, world.rs's `suburbs`
# district -- the WEST band in the v3 world) so plots sit on level ground --
# mirrors the old `flatten_terrain_for_plots` (#55), authored once at bake
# time. Mask rect in grid cells (5m/cell): x:[0,306), y:[0,500) -- covers
# the plot field's world-space bounding box x:[40,1440], y:[40,2400] with
# margin to spare. This crop's placement was chosen so the rectangle sits
# on real inland hillside (min ~34m, zero low-lying/river cells, checked
# directly against the converted grid) -- nowhere near the river or bay.
capital_flatten_mask = "masks/capital_flatten_v3.png"
capital_flatten_margin_m = 100.0

[detail]
# Small-scale texture on top of the real relief (#65) -- now redundant with
# the DEM's own native 5m micro-relief (no resampling smoothing it out
# anymore), but kept modest and harmless as a light finishing touch. Skipped
# entirely inside the water mask (empty here anyway) and the capital_flatten
# footprint, so the buildable plot field stays exactly level.
octaves = 3
base_amp_m = 0.6
slope_amp_curve = 1.5
lacunarity = 2.0
gain = 0.5
base_wavelength_m = 60.0
seed = 4242

[erosion]
# Design doc defaults. At native 5m resolution the steepest real points
# (right at the river bank edge) genuinely exceed the 55deg talus threshold
# -- a small, real, expected effect: erosion softens the sharpest riverbank
# edges instead of leaving them at their raw sampled steepness.
enabled = true
max_natural_slope = 55.0
thermal_iters = 40
hydraulic_iters = 0
hydraulic_strength = 0.1

[classify]
# Real slope variation exists (the river valley walls and the D'Aguilar
# foothills in the west) -- the steeper ground reads as forest, the rest as
# plains.
rules = [{ biome = "forest", min_slope = 8.0 }, { biome = "plains" }]
walkable_max_slope = 60.0
